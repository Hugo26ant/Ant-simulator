<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora 2º ESO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #eef2f7; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #555; font-size: 0.9em; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: border 0.3s; }
        input:focus { border-color: #007bff; outline: none; }
        small { color: #888; font-size: 0.8em; }
        button { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 1em; }
        button:hover { background: #0056b3; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-size: 1.2em; font-weight: bold; display: none; }
        .aprobado { background: #d4edda; color: #155724; display: block !important; }
        .suspenso { background: #f8d7da; color: #721c24; display: block !important; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Matemáticas</h2>
        
        <label>Notas de Cuaderno (10%):</label>
        <small>Separa con comas: 8, 7.5, 9</small>
        <input type="text" id="cuaderno" placeholder="Ej: 5, 6.5">
        
        <label>Notas de Parciales (40%):</label>
        <small>Separa con comas: 4, 6, 5</small>
        <input type="text" id="parciales" placeholder="Ej: 7, 8">
        
        <label>Notas Examen Trimestral (50%):</label>
        <small>Si es uno solo, pon el número</small>
        <input type="text" id="trimestral" placeholder="Ej: 6">

        <button onclick="calcular()">Calcular Nota Final</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        // Función para convertir el texto "5, 6, 7" en una media (6)
        function obtenerMedia(idInput) {
            const texto = document.getElementById(idInput).value;
            if (!texto.trim()) return 0;

            // Divide el texto por comas, quita espacios y convierte a números
            const notas = texto.split(',')
                               .map(n => parseFloat(n.trim()))
                               .filter(n => !isNaN(n));

            if (notas.length === 0) return 0;
            const suma = notas.reduce((acc, n) => acc + n, 0);
            return suma / notas.length;
        }

        function calcular() {
            const mediaCuaderno = obtenerMedia('cuaderno');
            const mediaParciales = obtenerMedia('parciales');
            const mediaTrimestral = obtenerMedia('trimestral');

            // Cálculo final basado en los pesos (0.1, 0.4, 0.5)
            const notaFinal = (mediaCuaderno * 0.10) + 
                              (mediaParciales * 0.40) + 
                              (mediaTrimestral * 0.50);

            const divResultado = document.getElementById('resultado');
            divResultado.innerHTML = `Nota Final: ${notaFinal.toFixed(2)}`;
            
            // Cambiar color según si aprueba o no
            if (notaFinal >= 5) {
                divResultado.className = 'aprobado';
            } else {
                divResultado.className = 'suspenso';
            }
        }
    </script>
</body>
</html>
