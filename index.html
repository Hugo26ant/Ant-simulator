<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular medias</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }
        
        /* Header */
        header {
            background: white; padding: 15px 20px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-title { font-weight: bold; color: #555; font-size: 1.1em; }
        .menu-btn { font-size: 28px; cursor: pointer; color: var(--primary); user-select: none; }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: 0.3s; padding: 20px; z-index: 1000; box-sizing: border-box;
        }
        .sidebar.active { right: 0; }
        .sidebar h3 { border-bottom: 2px solid var(--bg); padding-bottom: 10px; color: #333; margin-top: 0; }
        
        /* Estilo Historial */
        #lista-historial { list-style: none; padding: 0; max-height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .historial-item { 
            padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9em; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .borrar-btn { color: #d93025; cursor: pointer; font-weight: bold; font-size: 1.2em; padding: 5px; }

        /* Contenido */
        .container { display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        .grupo { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; }
        
        #resultado { margin-top: 25px; padding: 20px; border-radius: 10px; text-align: center; font-size: 1.4em; font-weight: bold; display: none; }
        .aprobado { background: #e6f4ea; color: #1e8e3e; border: 1px solid #1e8e3e; display: block !important; }
        .suspenso { background: #fce8e6; color: #d93025; border: 1px solid #d93025; display: block !important; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="header-title">Calcular medias</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <h3>📋 Historial</h3>
    <ul id="lista-historial"></ul>
    <button onclick="borrarTodo()" style="background:#666; font-size: 14px; padding: 8px; margin-bottom: 30px;">Limpiar Historial</button>
    
    <h3>📚 Asignaturas</h3>
    <ul style="list-style:none; padding:0;">
        <li style="padding: 12px; background: #eef3ff; border-radius: 8px; color: var(--primary); font-weight: bold;">Mates</li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h2 id="titulo">Mates</h2>
        <div class="grupo"><label>Cuaderno</label><input type="text" id="cuaderno"></div>
        <div class="grupo"><label>Parciales</label><input type="text" id="parciales"></div>
        <div class="grupo"><label>Trimestral</label><input type="text" id="trimestral"></div>
        <button onclick="calcular()">Calcular Nota Final</button>
        <div id="resultado"></div>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        mostrarHistorial();
    }

    function procesarNotas(id) {
        const input = document.getElementById(id).value.trim();
        if (!input) return [];
        return input.split(/\s+/).map(n => parseFloat(n.replace(',', '.'))).filter(n => !isNaN(n));
    }

    function calcular() {
        const cuaderno = procesarNotas('cuaderno');
        const parciales = procesarNotas('parciales');
        const trimestral = procesarNotas('trimestral');

        // Lógica: 10% por nota cuaderno, 15% por parcial, 50% trimestral único
        const puntosCuaderno = cuaderno.reduce((acc, n) => acc + (n * 0.10), 0);
        const puntosParciales = parciales.reduce((acc, n) => acc + (n * 0.15), 0);
        const notaTrim = trimestral.length > 0 ? trimestral[0] : 0;
        const puntosTrimestral = notaTrim * 0.50;

        const total = (puntosCuaderno + puntosParciales + puntosTrimestral).toFixed(2);

        const divRes = document.getElementById('resultado');
        divRes.innerHTML = `Nota Final: ${total}`;
        divRes.className = parseFloat(total) >= 5 ? 'aprobado' : 'suspenso';
        divRes.style.display = 'block';

        guardarEnHistorial('Mates', total);
    }

    function guardarEnHistorial(asig, nota) {
        let historial = JSON.parse(localStorage.getItem('historial')) || [];
        const fecha = new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        historial.unshift({ asig, nota, fecha });
        localStorage.setItem('historial', JSON.stringify(historial));
    }

    function mostrarHistorial() {
        const lista = document.getElementById('lista-historial');
        const historial = JSON.parse(localStorage.getItem('historial')) || [];
        lista.innerHTML = historial.length === 0 ? '<p style="color:gray; font-size:0.9em;">No hay cálculos guardados.</p>' : '';
        
        historial.forEach((item, index) => {
            lista.innerHTML += `
                <li class="historial-item">
                    <span><strong>${item.nota}</strong> - ${item.asig}<br><small style="color:gray;">${item.fecha}</small></span>
                    <span class="borrar-btn" onclick="event.stopPropagation(); borrarItem(${index})">✕</span>
                </li>`;
        });
    }

    function borrarItem(index) {
        let historial = JSON.parse(localStorage.getItem('historial'));
        historial.splice(index, 1);
        localStorage.setItem('historial', JSON.stringify(historial));
        mostrarHistorial();
    }

    function borrarTodo() {
        if(confirm("¿Borrar todo el historial?")) {
            localStorage.removeItem('historial');
            mostrarHistorial();
        }
    }
</script>
</body>
</html>
